<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/></linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a2740"/><stop offset="0.5" stop-color="#0f1a30"/><stop offset="1" stop-color="#0a1120"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#11213d"/><stop offset="1" stop-color="#0d1a30"/></linearGradient>
    <linearGradient id="alu" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c9ccd1"/><stop offset="1" stop-color="#9aa0a8"/></linearGradient>
    <radialGradient id="iris" cx="0.42" cy="0.4" r="0.6"><stop offset="0" stop-color="#ff6a5a"/><stop offset="0.7" stop-color="#ef4b3c"/><stop offset="1" stop-color="#d0331f"/></radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000" flood-opacity="0.45"/></filter>
    <clipPath id="heroLid"><rect x="-11" y="0" width="22" height="8"/></clipPath>
  </defs>
  <rect width="1280" height="640" fill="url(#page)"/>

  <!-- laptop, scaled to fit 1280x640; original art is ~1200 wide x 720 tall centered at 800,510 -->
  <g transform="translate(-16,-99) scale(0.82)">
    <g filter="url(#sh)">
      <rect x="300" y="150" width="1000" height="640" rx="26" fill="#0b0d12" stroke="#2b2f38" stroke-width="3"/>
      <circle cx="800" cy="172" r="4" fill="#22262e"/>
      <rect x="318" y="188" width="964" height="584" rx="10" fill="url(#wall)"/>
      <rect x="318" y="188" width="964" height="40" rx="10" fill="url(#bar)"/>
      <rect x="318" y="214" width="964" height="14" fill="url(#bar)"/>
      <circle cx="345" cy="208" r="7" fill="#e6e8ea"/>
      <rect x="368" y="203" width="46" height="10" rx="3" fill="#e6e8ea" opacity="0.9"/>
      <rect x="430" y="203" width="34" height="10" rx="3" fill="#aeb3ba" opacity="0.7"/>
      <rect x="480" y="203" width="34" height="10" rx="3" fill="#aeb3ba" opacity="0.7"/>
      <g fill="#cfd3d8" opacity="0.85"><rect x="1000" y="201" width="16" height="14" rx="2"/><circle cx="1045" cy="208" r="7"/><rect x="1075" y="201" width="18" height="14" rx="3"/><rect x="1150" y="202" width="30" height="12" rx="3"/></g>
      <rect x="1200" y="202" width="60" height="12" rx="3" fill="#e6e8ea"/>
      <g transform="translate(958,208)">
        <circle cx="0" cy="0" r="20" fill="#ef4b3c" opacity="0.16"/>
        <path d="M-15 0 Q0 -12 15 0 Q0 12 -15 0 Z" fill="none" stroke="#ef4b3c" stroke-width="3.4" stroke-linejoin="round"/>
        <circle cx="0" cy="0" r="6.4" fill="url(#iris)"/><circle cx="0" cy="0" r="2.8" fill="#2a0c07"/>
      </g>
      <text x="800" y="540" font-family="-apple-system,Helvetica,Arial" font-size="46" font-weight="800" fill="#eef2f7" text-anchor="middle">Your Mac stays awake</text>
      <g transform="translate(618,585)"><path d="M-11 0 Q0 -8 11 0 Q0 8 -11 0 Z" fill="none" stroke="#ef4b3c" stroke-width="2.4" stroke-linejoin="round"/><circle cx="0" cy="0" r="4.6" fill="url(#iris)"/></g>
      <text x="640" y="591" font-family="-apple-system,Helvetica,Arial" font-size="22" font-weight="500" fill="#c3ccd8">Stay Awake — Display On</text>
      <g transform="translate(618,623)"><line x1="-11" y1="0" x2="11" y2="0" stroke="#ef4b3c" stroke-width="2.4" stroke-linecap="round"/><path d="M-11 0 Q0 7 11 0" fill="none" stroke="#ef4b3c" stroke-width="2.4" stroke-linejoin="round"/><circle cx="0" cy="1.5" r="3.8" fill="url(#iris)" clip-path="url(#heroLid)"/></g>
      <text x="640" y="629" font-family="-apple-system,Helvetica,Arial" font-size="22" font-weight="500" fill="#c3ccd8">Stay Awake — Display Off</text>
      <rect x="300" y="786" width="1000" height="10" rx="4" fill="#2b2f38"/>
      <path d="M232 796 L1368 796 L1400 858 Q1400 872 1384 872 L216 872 Q200 872 200 858 Z" fill="url(#alu)"/>
      <rect x="690" y="796" width="220" height="14" rx="7" fill="#7f858d"/>
    </g>
  </g>
</svg>
