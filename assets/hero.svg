<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141b26"/><stop offset="1" stop-color="#0d131c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2634"/><stop offset="1" stop-color="#151d29"/>
    </linearGradient>
    <radialGradient id="iris" cx="0.42" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ff6a5a"/><stop offset="0.7" stop-color="#ef4b3c"/><stop offset="1" stop-color="#d0331f"/>
    </radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1600" height="620" fill="url(#page)"/>

  <text x="800" y="140" font-family="-apple-system,Helvetica,Arial" font-size="52" font-weight="800" fill="#eef2f7" text-anchor="middle">Two ways to stay awake</text>

  <!-- LEFT CARD: Keep display on (open red eye) -->
  <g filter="url(#sh)">
    <rect x="230" y="250" width="520" height="260" rx="28" fill="url(#card)" stroke="#2a3646" stroke-width="2"/>
  </g>
  <g transform="translate(360,360)">
    <!-- open eye -->
    <path d="M-58 0 Q0 -40 58 0 Q0 40 -58 0 Z" fill="none" stroke="#ef4b3c" stroke-width="11" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="22" fill="url(#iris)"/>
  </g>
  <text x="500" y="345" font-family="-apple-system,Helvetica,Arial" font-size="30" font-weight="700" fill="#f2f5f9">Keep display on</text>
  <text x="500" y="385" font-family="-apple-system,Helvetica,Arial" font-size="22" font-weight="500" fill="#93a0b2">Screen stays awake.</text>
  <text x="500" y="415" font-family="-apple-system,Helvetica,Arial" font-size="22" font-weight="500" fill="#93a0b2">Everything keeps running.</text>

  <!-- RIGHT CARD: Display off, stay awake (half-shut red eye) -->
  <g filter="url(#sh)">
    <rect x="850" y="250" width="520" height="260" rx="28" fill="url(#card)" stroke="#2a3646" stroke-width="2"/>
  </g>
  <g transform="translate(980,360)">
    <!-- half-shut eye: flat upper lid + bottom arc + half iris -->
    <line x1="-58" y1="0" x2="58" y2="0" stroke="#ef4b3c" stroke-width="11" stroke-linecap="round"/>
    <path d="M-58 0 Q0 34 58 0" fill="none" stroke="#ef4b3c" stroke-width="11" stroke-linejoin="round"/>
    <clipPath id="lidclip"><rect x="-58" y="0" width="116" height="36"/></clipPath>
    <circle cx="0" cy="6" r="18" fill="url(#iris)" clip-path="url(#lidclip)"/>
  </g>
  <text x="1120" y="345" font-family="-apple-system,Helvetica,Arial" font-size="30" font-weight="700" fill="#f2f5f9">Display off, stay awake</text>
  <text x="1120" y="385" font-family="-apple-system,Helvetica,Arial" font-size="22" font-weight="500" fill="#93a0b2">Screen turns off to save power.</text>
  <text x="1120" y="415" font-family="-apple-system,Helvetica,Arial" font-size="22" font-weight="500" fill="#93a0b2">Your work keeps running.</text>
</svg>
